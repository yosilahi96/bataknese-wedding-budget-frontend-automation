name: Automation Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout automation repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run automation test
        run: npm test